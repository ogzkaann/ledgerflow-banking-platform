name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Maven verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: |
            pom.xml
            services/*/pom.xml

      - name: Verify reactor
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*
            **/target/failsafe-reports/*
            **/target/site/jacoco/*
            target/ledgerflow-sbom.json
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Operations Console
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/operations-console

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/operations-console/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Type-check generated contracts
        run: npm run typecheck

      - name: Run unit and component tests
        run: npm run test

      - name: Build production assets
        run: npm run build

      - name: Run mocked browser journeys
        run: npm run test:e2e

      - name: Generate frontend CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx > frontend-sbom.json

      - name: Upload frontend evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: operations-console-evidence
          path: |
            apps/operations-console/coverage
            apps/operations-console/dist
            apps/operations-console/playwright-report
            apps/operations-console/test-results
            apps/operations-console/frontend-sbom.json
          if-no-files-found: ignore
          retention-days: 7
