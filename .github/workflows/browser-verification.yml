name: Real browser verification

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/operations-console/**"
      - "services/**"
      - "infra/keycloak/**"
      - "compose.yaml"
      - ".github/workflows/browser-verification.yml"

permissions:
  contents: read

concurrency:
  group: browser-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-stack:
    name: Keycloak + Gateway + workflow
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      LEDGERFLOW_ADMIN_PASSWORD: admin-demo-ci-only
      LEDGERFLOW_OPERATOR_PASSWORD: operator-demo-ci-only
      LEDGERFLOW_AUDITOR_PASSWORD: auditor-demo-ci-only

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/operations-console/package-lock.json

      - name: Package services
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests package

      - name: Start required infrastructure
        run: |
          docker compose up -d --wait postgres transfer-postgres risk-postgres notification-postgres redis kafka keycloak
          docker compose run --rm kafka-init
          docker compose run --rm keycloak-demo-users

      - name: Start five Java applications
        run: |
          for service in account-service transfer-service risk-service notification-service api-gateway; do
            jar="$(find "services/${service}/target" -maxdepth 1 -name '*-exec.jar' | head -n 1)"
            nohup java -jar "${jar}" --spring.profiles.active=local > "${RUNNER_TEMP}/${service}.log" 2>&1 &
          done
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8080/actuator/health/readiness >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat "${RUNNER_TEMP}"/*.log
          exit 1

      - name: Install frontend and Chromium
        working-directory: apps/operations-console
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run real browser workflow
        working-directory: apps/operations-console
        env:
          LEDGERFLOW_REAL_E2E: "true"
        run: npm run test:e2e:real

      - name: Upload browser and service evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: real-browser-evidence
          path: |
            apps/operations-console/playwright-report
            apps/operations-console/test-results
            ${{ runner.temp }}/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop infrastructure
        if: always()
        run: docker compose down --volumes
