name: Security and configuration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Java and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: java-kotlin,javascript-typescript
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3

  supply-chain:
    name: Secrets and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository with history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Scan repository for committed secrets
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          git --no-banner --redact /repo

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/operations-console/package-lock.json

      - name: Generate aggregate CycloneDX SBOM
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests verify

      - name: Audit locked frontend dependencies
        working-directory: apps/operations-console
        run: |
          npm ci
          npm audit --audit-level=high
          npm sbom --sbom-format cyclonedx > frontend-sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ledgerflow-cyclonedx-sbom
          path: |
            target/ledgerflow-sbom.json
            apps/operations-console/frontend-sbom.json
          if-no-files-found: error
          retention-days: 30

  contracts-and-config:
    name: Contracts and operations configuration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate OpenAPI contracts
        run: npx --yes @redocly/cli@2.40.0 lint contracts/openapi/*.yaml

      - name: Validate AsyncAPI contract
        run: npx --yes @asyncapi/cli@6.0.2 validate contracts/asyncapi/ledgerflow-events.yaml

      - name: Validate JSON assets
        run: |
          find infra -type f -name '*.json' -print0 |
            xargs -0 -n1 python3 -m json.tool >/dev/null

      - name: Validate Compose models
        run: |
          docker compose config --quiet
          docker compose --profile observability config --quiet

      - name: Validate Prometheus configuration and alerts
        run: >-
          docker run --rm
          -v "$PWD/infra/prometheus:/etc/prometheus:ro"
          --entrypoint /bin/promtool
          prom/prometheus:v3.13.1
          check config /etc/prometheus/prometheus.yml.template
