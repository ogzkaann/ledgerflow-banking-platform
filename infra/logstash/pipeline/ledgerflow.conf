input {
  file {
    id => "ledgerflow-json-files"
    path => ["/var/log/ledgerflow/*.json"]
    mode => "tail"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/ledgerflow.sincedb"
    codec => json
  }
}

filter {
  if ![@timestamp] {
    mutate {
      add_field => {
        "[@metadata][ingest_error]" => "missing_timestamp"
      }
    }
  }

  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
    tag_on_failure => ["ledgerflow_timestamp_parse_failure"]
  }

  mutate {
    remove_field => ["host", "path", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    index => "ledgerflow-logs-%{+YYYY.MM.dd}"
    manage_template => false
  }
}
