spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8090/realms/ledgerflow}
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:8090/realms/ledgerflow/protocol/openid-connect/certs}
          audiences: ${OIDC_AUDIENCE:ledgerflow-api}
          jws-algorithms: RS256
  data:
    redis:
      host: ${GATEWAY_REDIS_HOST:localhost}
      port: ${GATEWAY_REDIS_PORT:6379}
      connect-timeout: 500ms
      timeout: 500ms
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - RemoveRequestHeader=X-Authenticated-User
            - RemoveRequestHeader=X-User-Id
            - RemoveRequestHeader=X-User-Roles
            - RemoveRequestHeader=X-Forwarded-User
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              "[/**]":
                allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
                allowed-methods:
                  - GET
                  - POST
                  - OPTIONS
                allowed-headers:
                  - Authorization
                  - Content-Type
                  - Idempotency-Key
                  - X-Correlation-Id
                exposed-headers:
                  - Location
                  - X-Correlation-Id
                  - Idempotency-Replayed
                  - Retry-After
                allow-credentials: false
                max-age: 3600
          routes:
            - id: account-create
              uri: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
              predicates:
                - Method=POST
                - Path=/api/v1/accounts
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@authenticatedPrincipalKeyResolver}"
                    redis-rate-limiter.replenishRate: ${ACCOUNT_CREATE_RATE_PER_SECOND:2}
                    redis-rate-limiter.burstCapacity: ${ACCOUNT_CREATE_RATE_BURST:4}
                    redis-rate-limiter.requestedTokens: 1
            - id: account-funding
              uri: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
              predicates:
                - Method=POST
                - Path=/api/v1/accounts/*/test-funding
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@authenticatedPrincipalKeyResolver}"
                    redis-rate-limiter.replenishRate: ${ACCOUNT_FUNDING_RATE_PER_SECOND:1}
                    redis-rate-limiter.burstCapacity: ${ACCOUNT_FUNDING_RATE_BURST:2}
                    redis-rate-limiter.requestedTokens: 1
            - id: transfer-create
              uri: ${TRANSFER_SERVICE_URL:http://localhost:8082}
              predicates:
                - Method=POST
                - Path=/api/v1/transfers
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@authenticatedPrincipalKeyResolver}"
                    redis-rate-limiter.replenishRate: ${TRANSFER_CREATE_RATE_PER_SECOND:5}
                    redis-rate-limiter.burstCapacity: ${TRANSFER_CREATE_RATE_BURST:10}
                    redis-rate-limiter.requestedTokens: 1
            - id: account-read
              uri: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
              predicates:
                - Method=GET
                - Path=/api/v1/accounts/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@authenticatedPrincipalKeyResolver}"
                    redis-rate-limiter.replenishRate: ${GENERAL_READ_RATE_PER_SECOND:20}
                    redis-rate-limiter.burstCapacity: ${GENERAL_READ_RATE_BURST:40}
                    redis-rate-limiter.requestedTokens: 1
            - id: transfer-read
              uri: ${TRANSFER_SERVICE_URL:http://localhost:8082}
              predicates:
                - Method=GET
                - Path=/api/v1/transfers/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@authenticatedPrincipalKeyResolver}"
                    redis-rate-limiter.replenishRate: ${GENERAL_READ_RATE_PER_SECOND:20}
                    redis-rate-limiter.burstCapacity: ${GENERAL_READ_RATE_BURST:40}
                    redis-rate-limiter.requestedTokens: 1
            - id: notification-read
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Method=GET
                - Path=/api/v1/notifications/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@authenticatedPrincipalKeyResolver}"
                    redis-rate-limiter.replenishRate: ${GENERAL_READ_RATE_PER_SECOND:20}
                    redis-rate-limiter.burstCapacity: ${GENERAL_READ_RATE_BURST:40}
                    redis-rate-limiter.requestedTokens: 1

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
