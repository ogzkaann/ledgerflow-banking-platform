spring:
  application:
    name: transfer-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8090/realms/ledgerflow}
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:8090/realms/ledgerflow/protocol/openid-connect/certs}
          audiences: ${OIDC_AUDIENCE:ledgerflow-api}
          jws-algorithms: RS256
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
    listener:
      ack-mode: record
  datasource:
    url: ${TRANSFER_DB_URL:jdbc:postgresql://localhost:5433/ledgerflow_transfer}
    username: ${TRANSFER_DB_USERNAME:ledgerflow_transfer}
    password: ${TRANSFER_DB_PASSWORD:ledgerflow-transfer-local-only}
    hikari:
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration/transfer
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      repositories:
        enabled: false
      host: ${TRANSFER_REDIS_HOST:localhost}
      port: ${TRANSFER_REDIS_PORT:6379}
      connect-timeout: 500ms
      timeout: 500ms

ledgerflow:
  transfer:
    idempotency:
      redis-ttl: 24h
  outbox:
    poll-interval: ${TRANSFER_OUTBOX_POLL_INTERVAL:500ms}
    batch-size: ${TRANSFER_OUTBOX_BATCH_SIZE:50}
    ack-timeout: ${KAFKA_ACK_TIMEOUT:10s}

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db,kafka
