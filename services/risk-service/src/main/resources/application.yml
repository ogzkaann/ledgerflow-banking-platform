spring:
  application:
    name: risk-service
  datasource:
    url: ${RISK_DB_URL:jdbc:postgresql://localhost:5434/ledgerflow_risk}
    username: ${RISK_DB_USERNAME:ledgerflow_risk}
    password: ${RISK_DB_PASSWORD:ledgerflow-risk-local-only}
  flyway:
    enabled: true
    locations: classpath:db/migration/risk
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
    listener:
      ack-mode: record

ledgerflow:
  risk:
    maximum-amount: ${RISK_MAXIMUM_AMOUNT:5000.00}
    blocked-marker: ${RISK_BLOCKED_MARKER:RISK-REJECT}
    rule-version: ${RISK_RULE_VERSION:risk-rules-v1}
  outbox:
    poll-interval: ${RISK_OUTBOX_POLL_INTERVAL:500ms}
    batch-size: ${RISK_OUTBOX_BATCH_SIZE:50}
    ack-timeout: ${KAFKA_ACK_TIMEOUT:10s}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db,kafka
