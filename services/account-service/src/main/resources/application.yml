spring:
  application:
    name: account-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
    listener:
      ack-mode: record
  datasource:
    url: ${ACCOUNT_DB_URL:jdbc:postgresql://localhost:5432/ledgerflow_account}
    username: ${ACCOUNT_DB_USERNAME:ledgerflow}
    password: ${ACCOUNT_DB_PASSWORD:ledgerflow-local-only}
  flyway:
    enabled: true
    locations: classpath:db/migration/account
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db,kafka

ledgerflow:
  outbox:
    poll-interval: ${ACCOUNT_OUTBOX_POLL_INTERVAL:500ms}
    batch-size: ${ACCOUNT_OUTBOX_BATCH_SIZE:50}
    ack-timeout: ${KAFKA_ACK_TIMEOUT:10s}
