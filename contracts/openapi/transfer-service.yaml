openapi: 3.1.0
info:
  title: LedgerFlow Transfer Service API
  version: 1.0.0
  license:
    name: MIT
    identifier: MIT
  description: |
    Accepts idempotent transfer workflow requests. A 202 response means the request
    and its Kafka event intent are durably PENDING; account validation, reservation,
    risk, and settlement continue asynchronously. Clients use the read and history
    operations to observe completion or rejection.
servers:
  - url: http://localhost:8082
security:
  - ledgerflowOidc: []
paths:
  /api/v1/transfers:
    get:
      operationId: listTransfers
      summary: List transfers with bounded operational filters
      x-required-roles: [ledgerflow-operator, ledgerflow-auditor, ledgerflow-admin]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TransferStatus"
        - name: sourceAccountId
          in: query
          schema:
            type: string
            format: uuid
        - name: destinationAccountId
          in: query
          schema:
            type: string
            format: uuid
        - name: reference
          in: query
          description: Case-insensitive literal substring, with wildcard characters escaped
          schema:
            type: string
            maxLength: 100
        - name: correlationId
          in: query
          schema:
            type: string
            maxLength: 100
        - name: createdFrom
          in: query
          description: Inclusive lower creation timestamp
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          description: Inclusive upper creation timestamp
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Transfer page ordered by creation time and transfer ID, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      operationId: createTransfer
      summary: Accept a transfer workflow request
      x-required-roles: [ledgerflow-operator, ledgerflow-admin]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
            example:
              sourceAccountId: 0d17936c-05d5-45ae-9ee8-0a33f7ae8256
              destinationAccountId: ae36fc23-a25d-40fb-a336-1a1604739880
              amount: "125.50"
              currency: EUR
              reference: invoice-2026-001
      responses:
        "202":
          description: New or idempotently replayed PENDING transfer
          headers:
            Location:
              description: Relative URI of the transfer
              schema:
                type: string
              example: /api/v1/transfers/8ca2c0cd-e97a-4168-b145-bcf7179dd7ef
            X-Correlation-Id:
              description: Supplied or generated log-safe correlation identifier
              schema:
                type: string
                maxLength: 100
            Idempotency-Replayed:
              description: Present with value true only when returning an existing transfer
              schema:
                type: string
                const: "true"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/transfers/{transferId}:
    parameters:
      - $ref: "#/components/parameters/TransferId"
    get:
      operationId: getTransfer
      summary: Retrieve current transfer state
      x-required-roles: [ledgerflow-operator, ledgerflow-auditor, ledgerflow-admin]
      responses:
        "200":
          description: Transfer representation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/transfers/{transferId}/history:
    parameters:
      - $ref: "#/components/parameters/TransferId"
    get:
      operationId: getTransferHistory
      summary: Retrieve bounded state history oldest first
      x-required-roles: [ledgerflow-operator, ledgerflow-auditor, ledgerflow-admin]
      responses:
        "200":
          description: Immutable transition history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransferHistory"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  securitySchemes:
    ledgerflowOidc:
      type: openIdConnect
      description: >-
        Internal operations OIDC. Runtime issuer and audience are configured with
        OIDC_ISSUER_URI and OIDC_AUDIENCE; the local realm uses ledgerflow-api.
      openIdConnectUrl: http://localhost:8090/realms/ledgerflow/.well-known/openid-configuration
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Globally scoped to transfer creation until client identity exists.
      schema:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[A-Za-z0-9._:-]+$"
      example: transfer-request-001
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[A-Za-z0-9._:-]+$"
    TransferId:
      name: transferId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateTransferRequest:
      type: object
      additionalProperties: false
      required: [sourceAccountId, destinationAccountId, amount, currency, reference]
      properties:
        sourceAccountId:
          type: string
          format: uuid
        destinationAccountId:
          type: string
          format: uuid
          description: Must differ from sourceAccountId. Account existence and currency are validated asynchronously by Account Service.
        amount:
          type: string
          pattern: "^[0-9]+(?:\\.[0-9]{1,2})?$"
          description: Positive decimal monetary string with at most two fractional digits.
          example: "125.50"
        currency:
          type: string
          enum: [EUR, USD, GBP]
        reference:
          type: string
          minLength: 1
          maxLength: 100
    Transfer:
      type: object
      required:
        - transferId
        - sourceAccountId
        - destinationAccountId
        - amount
        - currency
        - reference
        - status
        - correlationId
        - createdAt
        - updatedAt
        - version
      properties:
        transferId:
          type: string
          format: uuid
        sourceAccountId:
          type: string
          format: uuid
        destinationAccountId:
          type: string
          format: uuid
        amount:
          type: string
          pattern: "^[0-9]+\\.[0-9]{2}$"
        currency:
          type: string
          enum: [EUR, USD, GBP]
        reference:
          type: string
        status:
          $ref: "#/components/schemas/TransferStatus"
          description: Creation returns PENDING; no public status-transition endpoint exists.
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
          minimum: 0
    TransferStatus:
      type: string
      enum: [PENDING, FUNDS_RESERVED, RISK_APPROVED, SETTLING, COMPLETED, REJECTED, COMPENSATING, EXPIRED]
    TransferPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Transfer"
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          maximum: 100
        totalElements:
          type: integer
          format: int64
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    TransferHistory:
      type: object
      required: [transitionId, toStatus, reason, occurredAt, sequence]
      properties:
        transitionId:
          type: string
          format: uuid
        fromStatus:
          type: [string, "null"]
          description: Null for initial creation.
        toStatus:
          type: string
        reason:
          type: string
        occurredAt:
          type: string
          format: date-time
        sequence:
          type: integer
          format: int64
          minimum: 0
    ProblemDetail:
      type: object
      required: [type, title, status, detail, instance]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
  responses:
    Unauthorized:
      description: Missing, malformed, expired, wrong-issuer, wrong-audience, or unsupported JWT
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Forbidden:
      description: Authenticated principal lacks a required LedgerFlow role
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    RateLimited:
      description: API Gateway rate limit exceeded
      headers:
        Retry-After:
          description: Suggested delay in seconds before retry
          schema:
            type: integer
            minimum: 1
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    BadRequest:
      description: Malformed body, identifier, or required header
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: Transfer does not exist
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: Idempotency key reused for a different logical request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Unprocessable:
      description: Semantically invalid transfer
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    InternalError:
      description: Safe unexpected-error response
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
  headers:
    CorrelationId:
      description: Trusted request correlation identifier
      schema:
        type: string
        maxLength: 64
